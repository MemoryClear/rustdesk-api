<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>403 - 此路不通</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            overflow: hidden;
        }

        .container {
            text-align: center;
            color: #fff;
            padding: 2rem;
        }

        .emoji {
            font-size: 6rem;
            animation: float 3s ease-in-out infinite;
            margin-bottom: 1rem;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .code {
            font-size: 8rem;
            font-weight: 900;
            background: linear-gradient(135deg, #ff6b6b, #ffa500);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1;
            margin-bottom: 1rem;
            text-shadow: 0 0 40px rgba(255, 107, 107, 0.3);
        }

        .title {
            font-size: 2rem;
            color: #e0e0e0;
            margin-bottom: 1rem;
            letter-spacing: 0.1em;
        }

        .message {
            font-size: 1.1rem;
            color: #a0a0a0;
            max-width: 480px;
            margin: 0 auto 2rem;
            line-height: 1.8;
        }

        .message strong {
            color: #ffa500;
            font-weight: 600;
        }

        .btn {
            display: inline-block;
            padding: 0.8rem 2.5rem;
            background: linear-gradient(135deg, #ff6b6b, #ee5a24);
            color: #fff;
            text-decoration: none;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: 0.05em;
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(255, 107, 107, 0.3);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 30px rgba(255, 107, 107, 0.5);
        }

        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }

        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: #fff;
            border-radius: 50%;
            opacity: 0.3;
            animation: twinkle 3s ease-in-out infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.8; }
        }

        .divider {
            width: 60px;
            height: 3px;
            background: linear-gradient(90deg, #ff6b6b, #ffa500);
            margin: 1.5rem auto;
            border-radius: 2px;
        }
    </style>
</head>
<body>
    <div class="stars">
        <div class="star" style="top:10%; left:20%; animation-delay: 0s;"></div>
        <div class="star" style="top:30%; left:80%; animation-delay: 0.5s;"></div>
        <div class="star" style="top:60%; left:15%; animation-delay: 1s;"></div>
        <div class="star" style="top:80%; left:70%; animation-delay: 1.5s;"></div>
        <div class="star" style="top:15%; left:55%; animation-delay: 2s;"></div>
        <div class="star" style="top:45%; left:90%; animation-delay: 2.5s;"></div>
        <div class="star" style="top:75%; left:35%; animation-delay: 0.8s;"></div>
    </div>

    <div class="container">
        <div class="emoji">🚧</div>
        <div class="code">403</div>
        <div class="title">此路不通</div>
        <div class="divider"></div>
        <div class="message">
            你发现了一个<strong>隐藏入口</strong>，<br>
            但这个 <strong>rustdesk-api</strong>服务器不对外开放登录页面。<br><br>
            别乱翻了，这里什么都没有。<br>
            收手吧，外面还有很多有趣的事等着你。
        </div>
        <a href="/" class="btn" onclick="history.back(); return false;">← 返回主页</a>
    </div>

    <div style="position:fixed; bottom:20px; right:24px; font-size:12px; color:rgba(255,255,255,0.25); letter-spacing:0.05em; user-select:none;">
        memory_clear
    </div>
</body>
</html>
